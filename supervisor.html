<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMASTER | Supervisor Console</title>
    <meta name="theme-color" content="#0b1b3f">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Firebase: App + Firestore + Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { navy:'#0b1b3f', navy2:'#122a5c', blue:'#2563eb', blueLt:'#6aa0ff', soft:'#eaf1ff' },
                    surface:'#f6f8fc', textMain:'#0f1c3a', textMuted:'#64748b',
                },
                fontFamily: { sans: ['Cairo','sans-serif'] }
            }}
        }
    </script>
    <style>
        body { background:#f6f8fc; color:#0f1c3a; height:100vh; overflow:hidden; display:flex; margin:0; }
        .custom-scrollbar::-webkit-scrollbar { width:6px; height:6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:20px; }
        .monitor-card { transition:transform .25s, box-shadow .25s, border-color .25s; }
        .monitor-card:hover { transform:translateY(-3px); box-shadow:0 14px 28px -12px rgba(11,27,63,.18); }
        .mini-btn { transition:all .18s; } .mini-btn:active { transform:scale(.95); }
        .filter-btn.active { background:#0b1b3f; color:#fff; border-color:#0b1b3f; }
        .pulse-dot { position:absolute; width:12px; height:12px; border-radius:50%; }
        .pulse-dot::after { content:''; position:absolute; inset:0; background:inherit; border-radius:50%; animation:p-ring 2s infinite cubic-bezier(.4,0,.2,1); }
        @keyframes p-ring { 0%{transform:scale(.8);opacity:.8} 100%{transform:scale(2.5);opacity:0} }
        .tab-pane { transition: opacity 0.3s ease; }
    </style>
</head>

<body class="font-sans selection:bg-brand-blue/25 bg-surface text-textMain flex h-screen overflow-hidden">

    <!-- Tailwind color classes preload (hidden) -->
    <div class="hidden">
        <span class="bg-emerald-50 bg-emerald-100 bg-emerald-500 text-emerald-600 text-emerald-700 border-emerald-100 border-emerald-200 border-emerald-500 hover:bg-emerald-50"></span>
        <span class="bg-amber-50 bg-amber-100 bg-amber-500 text-amber-600 text-amber-700 border-amber-100 border-amber-200 border-amber-500 hover:bg-amber-50"></span>
        <span class="bg-indigo-50 bg-indigo-100 bg-indigo-500 text-indigo-600 text-indigo-700 border-indigo-100 border-indigo-200 border-indigo-500 hover:bg-indigo-50"></span>
        <span class="bg-violet-50 bg-violet-100 bg-violet-500 text-violet-600 text-violet-700 border-violet-100 border-violet-200 border-violet-500 hover:bg-violet-50"></span>
        <span class="bg-sky-50 bg-sky-100 bg-sky-500 text-sky-600 text-sky-700 border-sky-100 border-sky-200 border-sky-500 hover:bg-sky-50"></span>
        <span class="bg-rose-50 bg-rose-100 bg-rose-500 text-rose-600 text-rose-700 border-rose-100 border-rose-200 border-rose-500 hover:bg-rose-50"></span>
        <span class="bg-slate-50 bg-slate-100 bg-slate-500 text-slate-500 text-slate-600 text-slate-700 border-slate-100 border-slate-200 border-slate-500 border-white hover:bg-slate-50"></span>
    </div>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 z-[600] bg-brand-navy flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="animate-spin rounded-full h-14 w-14 border-t-4 border-brand-blueLt border-r-4 border-r-transparent mb-4"></div>
        <h2 class="text-sm font-black tracking-widest text-brand-blueLt uppercase">ALMASTER CONSOLE</h2>
        <p class="text-xs text-white/50 mt-2 font-bold">Verifying supervisor credentials and live connection...</p>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-100 flex flex-col z-20 shadow-xl transition-all shrink-0">
        <!-- Logo Area -->
        <div class="h-20 flex items-center justify-center gap-3 px-6 border-b border-slate-50 shrink-0">
            <svg viewBox="0 0 24 24" class="w-7 h-7 text-brand-blueLt" fill="#2563eb" aria-hidden="true"><path d="M12 0l2.4 9.6L24 12l-9.6 2.4L12 24l-2.4-9.6L0 12l9.6-2.4z"/></svg>
            <h1 class="text-xl font-black tracking-tight">AL<span class="text-brand-blue"> MASTER</span></h1>
        </div>
        <!-- Nav Links -->
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-link active bg-brand-soft text-brand-blue w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-black text-xs transition-all hover:bg-brand-soft hover:text-brand-blue">
                <i class="fas fa-chart-pie w-5 text-center text-lg"></i> Dashboard
            </button>
            <button onclick="switchTab('requests')" id="nav-requests" class="nav-link text-textMuted w-full flex items-center justify-between px-4 py-3.5 rounded-xl font-black text-xs transition-all hover:bg-brand-soft hover:text-brand-blue">
                <div class="flex items-center gap-3"><i class="fas fa-envelope-open-text w-5 text-center text-lg"></i> Requests</div>
                <span id="nav-pending-badge" class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full hidden shadow-sm">0</span>
            </button>
        </nav>
        <!-- Sidebar Footer (Stats/Overview) -->
        <div class="p-4 border-t border-slate-100 bg-slate-50 shrink-0 text-center">
            <div class="text-[10px] font-black text-textMuted uppercase mb-2 tracking-widest">Active System</div>
            <div id="sidebar-counts" class="flex flex-wrap gap-1 justify-center"></div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative bg-surface">
        <!-- Header -->
        <header class="h-20 bg-white border-b border-slate-100 text-textMain flex items-center justify-between px-6 shadow-sm shrink-0">
            <div class="flex items-center gap-2">
                <div id="header-time" class="text-2xl font-black tabular-nums tracking-tighter text-brand-navy">00:00:00</div>
                <div class="w-px h-8 bg-slate-200 mx-2"></div>
                <div id="header-date" class="text-xs font-bold text-textMuted hidden sm:block">—</div>
            </div>
            
            <div class="flex items-center gap-4 shrink-0">
                <div class="flex items-center gap-3 border-l border-slate-200 pl-4">
                    <div class="text-right hidden sm:block leading-tight">
                        <p id="admin-name" class="text-sm font-black text-brand-navy">Supervisor</p>
                        <p class="text-[10px] font-bold text-brand-blue uppercase">Team Leader</p>
                    </div>
                    <img id="admin-avatar" src="" class="w-10 h-10 rounded-xl object-cover bg-slate-100 border border-slate-200 shadow-sm" alt="">
                </div>
                <button onclick="logoutAdmin()" class="w-10 h-10 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-xl flex items-center justify-center mini-btn transition-colors" title="Logout"><i class="fas fa-power-off"></i></button>
            </div>
        </header>
        
        <!-- Tabs Container -->
        <div class="flex-1 overflow-y-auto custom-scrollbar relative" id="tabs-container">
            
            <!-- Tab: Dashboard -->
            <div id="tab-dashboard" class="tab-pane absolute inset-0 p-6 flex flex-col gap-5">
                <div class="flex flex-wrap justify-between items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100 shrink-0">
                    <div id="filter-bar" class="flex flex-wrap gap-2 items-center">
                        <span class="text-xs font-black text-textMuted mr-2"><i class="fas fa-filter mr-1"></i> Filter:</span>
                        <button onclick="filterMonitor('all')" id="btn-filter-all" class="filter-btn active px-4 py-2 rounded-xl text-xs font-bold border border-slate-200 bg-white mini-btn">All (<span id="count-all">0</span>)</button>
                        <!-- Other filters injected via JS -->
                        <div id="dynamic-filters" class="flex flex-wrap gap-2"></div>
                        <button onclick="filterMonitor('Offline')" id="btn-filter-Offline" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold border border-slate-200 bg-white mini-btn">Offline (<span id="count-Offline">0</span>)</button>
                    </div>
                    <div class="relative w-full sm:w-64">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="monitor-search" oninput="renderMonitorGrid()" class="w-full bg-surface border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-xs font-bold outline-none focus:border-brand-blue" placeholder="Search employee...">
                    </div>
                </div>
                <div id="monitor-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 pb-10"></div>
            </div>
            
            <!-- Tab: Requests -->
            <div id="tab-requests" class="tab-pane absolute inset-0 p-6 hidden flex-col gap-5">
                 <div class="flex items-center gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 shrink-0">
                     <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl border border-amber-100"><i class="fas fa-envelope-open-text"></i></div>
                     <div>
                         <h2 class="text-lg font-black text-textMain">Pending Requests</h2>
                         <p class="text-xs text-textMuted font-bold">Approve or reject employee leave requests</p>
                     </div>
                 </div>
                 <div id="requests-queue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-10"></div>
            </div>
            
        </div>
    </main>
    
    <!-- Logs Modal -->
    <div id="modal-logs" class="fixed inset-0 z-[550] hidden bg-brand-navy/60 backdrop-blur-sm flex items-center justify-center p-4" onclick="closeModal('modal-logs')">
        <div class="bg-white w-full max-w-4xl rounded-[2rem] flex flex-col max-h-[85vh] shadow-2xl overflow-hidden border border-slate-100" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-slate-100 bg-surface flex flex-wrap gap-4 justify-between items-center shrink-0">
                <div>
                    <h3 id="log-report-title" class="font-black text-xl text-brand-navy mb-1"><i class="fas fa-history text-brand-blue mr-2"></i> Activity Log</h3>
                    <p id="log-report-subtitle" class="text-xs text-textMuted font-bold">Track employee status changes</p>
                </div>
                <div class="flex items-center gap-3">
                    <input type="date" id="history-date-picker" onchange="refreshHistoryWithDate()" class="border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-black outline-none bg-white cursor-pointer focus:border-brand-blue shadow-sm">
                    <button onclick="closeModal('modal-logs')" class="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 text-slate-500 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"><i class="fas fa-times text-lg"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-surface custom-scrollbar">
                <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead><tr class="bg-slate-50 border-b border-slate-200 text-textMuted font-black uppercase text-[10px] tracking-wider">
                            <th class="p-3 text-center w-12">#</th><th class="p-3">From</th><th class="p-3">To</th>
                            <th class="p-3 text-center">Time</th><th class="p-3 text-center">Duration</th><th class="p-3 text-center">Action By</th>
                        </tr></thead>
                        <tbody id="logs-timeline-body" class="font-bold text-textMain divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
            <div id="log-report-footer" class="p-5 border-t border-slate-200 bg-white flex justify-center items-center shrink-0"></div>
        </div>
    </div>

    <!-- MAIN APP SCRIPT -->
    <script>
    /* AL MASTER Central Console - English Translation & Redesign */
    const firebaseConfig = {
        apiKey: "AIzaSyCXyuT529aGwiS5j_RPxW_zEeAtkYc7JlM",
        authDomain: "almaster-b8c18.firebaseapp.com",
        projectId: "almaster-b8c18",
        storageBucket: "almaster-b8c18.firebasestorage.app",
        messagingSenderId: "884142036232",
        appId: "1:884142036232:web:eeb6677d988565653a08bd"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const secondaryApp = firebase.apps.find(a => a.name === 'SecondaryAdmin') || firebase.initializeApp(firebaseConfig, 'SecondaryAdmin');
    const db = firebase.firestore();
    const auth = firebase.auth();
    const secondaryAuth = secondaryApp.auth();
    const serverTs = () => firebase.firestore.FieldValue.serverTimestamp();

    const COMPANY_TZ = 'Africa/Cairo';
    let RESET_HOUR = 23, WORK_START = '09:00', ANNUAL_LEAVE_DEFAULT = 21;

    let STATUSES = {
        Online:    { label:'Working',   btnLabel:'Start Work', color:'emerald', icon:'fa-laptop-code', counted:true,  enabled:true },
        Break:     { label:'Break',     btnLabel:'Break',      color:'amber',   icon:'fa-mug-hot',     counted:true,  enabled:true },
        Meeting:   { label:'Meeting',   btnLabel:'Meeting',    color:'indigo',  icon:'fa-users',       counted:true,  enabled:true },
        Offline:   { label:'Offline',   btnLabel:'',           color:'slate',   icon:'fa-power-off',   counted:false, enabled:true },
    };
    const EDITABLE = ['Online','Break','Meeting'];
    const PALETTE = ['emerald','amber','indigo','violet','sky','rose','teal','orange','purple','cyan','slate'];

    // Cartoonish SVG Avatars Generated by Code
    const maleSVG = encodeURIComponent(`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="50" fill="#eaf1ff"/><circle cx="50" cy="38" r="18" fill="#2563eb"/><path d="M20,95 Q50,60 80,95 Z" fill="#2563eb"/></svg>`);
    const femaleSVG = encodeURIComponent(`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="50" fill="#fdf2f8"/><circle cx="50" cy="38" r="16" fill="#db2777"/><path d="M20,95 Q50,60 80,95 Z" fill="#db2777"/><circle cx="34" cy="42" r="8" fill="#db2777"/><circle cx="66" cy="42" r="8" fill="#db2777"/></svg>`);

    let currentUser = null, userProfile = null, allUsersData = [], leaveBalances = {};
    let currentMonitorFilter = 'all', currentViewingEmail = '';
    let serverOffset = 0, timeReady = false;
    const Toast = Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true });

    const serverNow = () => Date.now() + serverOffset;
    const countedKeys = () => Object.keys(STATUSES).filter(k => STATUSES[k].counted && k !== 'Offline');
    const sLabel = (k) => (STATUSES[k] || {}).label || k || '—';
    const sColor = (k) => (STATUSES[k] || {}).color || 'slate';
    const sIcon  = (k) => (STATUSES[k] || {}).icon  || 'fa-circle';
    
    function getAvatar(u) {
        if (u && u.photo) return u.photo;
        const gender = (u && u.gender) ? u.gender : 'male';
        return `data:image/svg+xml;charset=utf-8,${gender === 'female' ? femaleSVG : maleSVG}`;
    }
    
    // Time utils
    async function syncServerTime() {
        try {
            const probe = db.collection('_serverTime').doc(currentUser.uid);
            const t0 = Date.now(); await probe.set({ ts: serverTs() });
            const snap = await probe.get({ source:'server' }); const t1 = Date.now();
            serverOffset = snap.data().ts.toMillis() - (t0 + (t1 - t0) / 2);
        } catch (e) { serverOffset = 0; }
        timeReady = true;
    }
    function pad(n){ return String(n).padStart(2,'0'); }
    function zonedParts(ms){
        const dtf = new Intl.DateTimeFormat('en-GB',{timeZone:COMPANY_TZ,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
        const p={}; dtf.formatToParts(new Date(ms)).forEach(x=>{ if(x.type!=='literal') p[x.type]=x.value; });
        if(p.hour==='24') p.hour='00';
        return { y:+p.year, mo:+p.month, d:+p.day, h:+p.hour, mi:+p.minute, s:+p.second };
    }
    function zonedYMD(ms){ const p=zonedParts(ms); return `${p.y}-${pad(p.mo)}-${pad(p.d)}`; }
    function getDayKey(ms){ return zonedYMD(ms + (24 - RESET_HOUR) * 3600 * 1000); }
    const getMillis = (v) => v ? (v.toMillis ? v.toMillis() : (typeof v==='number'? v : serverNow())) : serverNow();
    function fmtDuration(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000); return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`; }
    function fmtDate(ms){ return new Intl.DateTimeFormat('en-GB',{timeZone:COMPANY_TZ,weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(new Date(ms)); }
    function fmtTime(ms){ return new Intl.DateTimeFormat('en-GB',{timeZone:COMPANY_TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}).format(new Date(ms)); }

    // Auth
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.replace('index.html'); return; }
        currentUser = user;
        try {
            const doc = await db.collection('users').doc(user.email.toLowerCase().trim()).get();
            if (!doc.exists) { auth.signOut(); return; }
            userProfile = doc.data();
            // Allow access to supervisor
            document.getElementById('admin-name').innerText = userProfile.name || 'Supervisor';
            document.getElementById('admin-avatar').src = getAvatar(userProfile);
            await syncServerTime();
            initAdminConsole();
        } catch (e) { console.error(e); Toast.fire({icon:'error', title:'Database connection error'}); }
    });

    function initAdminConsole() {
        startClock();
        listenToConfig();
        listenToAllUsers();
        listenToLeaveRequests();
        setInterval(updateTimersUI, 1000);
        const loader = document.getElementById('loader');
        loader.style.opacity = '0'; setTimeout(() => loader.classList.add('hidden'), 400);
    }

    async function logoutAdmin() {
        const r = await Swal.fire({ title:'Logout?', text:'End administrative session.', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#64748b', confirmButtonText:'Yes, Logout', cancelButtonText:'Cancel' });
        if (r.isConfirmed) { await auth.signOut(); window.location.replace('index.html'); }
    }

    // Config
    function listenToConfig() {
        db.collection('system_settings').doc('work_config').onSnapshot(doc => {
            if (doc.exists) {
                const c = doc.data();
                if (typeof c.resetHour === 'number') RESET_HOUR = c.resetHour;
                if (typeof c.workStart === 'string') WORK_START = c.workStart;
                if (typeof c.annualLeaveDefault === 'number') ANNUAL_LEAVE_DEFAULT = c.annualLeaveDefault;
                if (c.statuses) Object.keys(c.statuses).forEach(k => { if (STATUSES[k]) STATUSES[k] = Object.assign({}, STATUSES[k], c.statuses[k]); });
            }
            // Update filter buttons
            const fBar = document.getElementById('dynamic-filters');
            if(fBar) {
                fBar.innerHTML = EDITABLE.map(k => `<button onclick="filterMonitor('${k}')" id="btn-filter-${k}" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold border border-slate-200 bg-white mini-btn">${sLabel(k)} (<span id="count-${k}">0</span>)</button>`).join('');
                filterMonitor(currentMonitorFilter); // re-apply active class
            }
            renderMonitorGrid();
        }, err => console.warn('config:', err.message));
    }

    // Users
    function listenToAllUsers() {
        db.collection('users').onSnapshot(snap => {
            allUsersData = snap.docs.map(d => ({ email: d.id, ...d.data() }));
            updateCounts(); renderMonitorGrid();
        }, err => console.warn('users:', err.message));
    }

    function updateCounts() {
        const by = (s) => allUsersData.filter(u => (u.status||'Offline') === s).length;
        const eAll = document.getElementById('count-all'); if(eAll) eAll.innerText = allUsersData.length;
        ['Online','Break','Meeting','Exception','Offline'].forEach(k => { const e = document.getElementById('count-'+k); if (e) e.innerText = by(k); });
        
        const sb = document.getElementById('sidebar-counts');
        if(sb) {
            sb.innerHTML = countedKeys().map(k =>
                `<div class="px-2 py-1 rounded bg-${sColor(k)}-50 border border-${sColor(k)}-100 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-${sColor(k)}-500"></span>
                    <span class="text-[9px] font-black text-${sColor(k)}-700">${by(k)} ${sLabel(k)}</span>
                </div>`
            ).join('');
        }
    }

    function filterMonitor(status) {
        currentMonitorFilter = status;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-brand-navy', 'text-white'));
        const b = document.getElementById('btn-filter-'+status); 
        if (b) { b.classList.add('active', 'bg-brand-navy', 'text-white'); b.classList.remove('bg-white'); }
        renderMonitorGrid();
    }

    function timerCellsHTML(u, start) {
        const tb = u.timeBank || {}, status = u.status || 'Offline';
        return countedKeys().map(k =>
            `<div class="bg-white p-2 rounded-xl border border-slate-100 text-center shadow-sm">
                <p class="text-[9px] font-black text-textMuted mb-0.5 uppercase tracking-wider flex items-center justify-center gap-1"><i class="fas ${sIcon(k)} text-${sColor(k)}-500"></i> ${sLabel(k)}</p>
                <p class="text-[11px] font-black text-textMain tabular-nums stat-timer" data-val="${tb[k]||0}" data-active="${status===k}" data-start="${start}">00:00:00</p>
            </div>`).join('');
    }

    function renderMonitorGrid() {
        const container = document.getElementById('monitor-grid'); if (!container) return;
        const term = (document.getElementById('monitor-search').value || '').toLowerCase().trim();
        const filtered = allUsersData.filter(u => {
            if (currentMonitorFilter !== 'all' && (u.status||'Offline') !== currentMonitorFilter) return false;
            return (u.name||'').toLowerCase().includes(term);
        });
        if (!filtered.length) {
            container.innerHTML = `<div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-400"><i class="fas fa-search text-4xl mb-4 opacity-50"></i><p class="text-sm font-bold">No employees found.</p></div>`;
            return;
        }
        container.innerHTML = filtered.map(u => {
            const status = u.status || 'Offline', s = STATUSES[status] || STATUSES.Offline;
            const start = getMillis(u.lastChange), isOn = status !== 'Offline';
            
            return `<div class="monitor-card p-5 rounded-3xl flex flex-col gap-3 relative bg-${s.color}-50/30 border border-${s.color}-100">
                <div class="flex justify-center relative w-full mb-1 mt-2">
                    <div class="relative shrink-0">
                        <img src="${getAvatar(u)}" class="w-20 h-20 rounded-full object-cover border-4 ${isOn?'border-'+s.color+'-500':'border-white'} shadow-md bg-white" alt="">
                        <span class="absolute bottom-1 right-1 pulse-dot bg-${s.color}-500 border-2 border-white z-10 ${!isOn?'hidden':''}"></span>
                    </div>
                </div>
                
                <div class="text-center">
                    <h4 class="text-base font-black text-textMain">${u.name||'—'}</h4>
                    <p class="text-[10px] text-textMuted font-bold uppercase tracking-wider mt-0.5">${u.title||'Employee'}</p>
                </div>
                
                <div class="flex justify-center mb-1">
                    <span class="px-3 py-1 rounded-full text-[10px] font-black text-${s.color}-700 bg-${s.color}-100 border border-${s.color}-200 shadow-sm"><i class="fas ${s.icon} mr-1"></i> ${s.label}</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mt-1">
                    ${timerCellsHTML(u, start)}
                </div>
                
                <div class="flex flex-col gap-2 pt-3 border-t border-${s.color}-100 mt-auto">
                    <button onclick="viewHistory('${u.email}')" class="w-full py-2 bg-white border border-slate-200 hover:border-brand-blue hover:text-brand-blue rounded-xl text-[10px] font-black mini-btn shadow-sm transition-colors"><i class="fas fa-history mr-1"></i> View Activity History</button>
                    <button onclick="adminForceLogout('${u.email}')" class="w-full py-2 bg-red-50 text-red-600 hover:bg-red-500 hover:text-white rounded-xl text-[10px] font-black mini-btn shadow-sm transition-colors border border-red-100"><i class="fas fa-power-off mr-1"></i> Force Logout</button>
                </div>
            </div>`;
        }).join('');
    }

    async function adminForceLogout(email) {
        const r = await Swal.fire({ title:'Force Logout?', text:'Force status to Offline?', icon:'warning', showCancelButton:true, confirmButtonColor:'#2563eb', cancelButtonColor:'#64748b', confirmButtonText:'Confirm', cancelButtonText:'Cancel' });
        if (!r.isConfirmed) return;
        try {
            const ref = db.collection('users').doc(email.toLowerCase().trim());
            const u = (await ref.get()).data();
            if (u.status === 'Offline') { Toast.fire({icon:'info', title:'Already Offline.'}); return; }

            const now = serverNow();
            const oldStatus = u.status || 'Offline';
            const dur = Math.max(0, now - getMillis(u.lastChange));
            const bank = {}; countedKeys().forEach(k => bank[k] = (u.timeBank && u.timeBank[k]) || 0);
            if (STATUSES[oldStatus] && STATUSES[oldStatus].counted) bank[oldStatus] += dur;

            const updates = { status: 'Offline', lastChange: serverTs(), timeBank: bank };
            await ref.update(updates);
            await db.collection('logs').add({
                user: email.toLowerCase().trim(), name: u.name || email,
                from_status: oldStatus, to_status: 'Offline',
                duration_ms: (STATUSES[oldStatus] && STATUSES[oldStatus].counted) ? dur : null,
                changed_by: 'admin', changed_by_name: userProfile.name || 'Supervisor',
                dayKey: getDayKey(now), timestamp: serverTs()
            });
            Toast.fire({icon:'success', title:'Forced Logout.'});
        } catch (e) { console.error(e); Toast.fire({icon:'error', title:'Update failed.'}); }
    }

    // Leave Requests
    const LEAVE_META = {
        sick:        { label:'Sick Leave', color:'rose'   },
        annual:      { label:'Annual Leave', color:'emerald' },
        excuse_late: { label:'Late Excuse', color:'amber'  },
        excuse_early:{ label:'Early Leave', color:'sky'   }
    };
    function listenToLeaveRequests() {
        db.collection('leave_requests').where('status','==','pending').onSnapshot(snap => {
            const box = document.getElementById('requests-queue-container'), badge = document.getElementById('nav-pending-badge');
            if (!box) return;
            if (snap.empty) {
                badge.classList.add('hidden');
                box.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center opacity-50 py-20"><i class="fas fa-check-circle text-5xl text-slate-300 mb-4"></i><p class="text-sm text-textMuted font-bold">All caught up! No pending requests.</p></div>`;
                return;
            }
            badge.classList.remove('hidden'); badge.innerText = snap.size;
            const rows = []; snap.forEach(d => rows.push({ id:d.id, ...d.data() }));
            rows.sort((a,b) => getMillis(b.submitted_at) - getMillis(a.submitted_at));
            box.innerHTML = rows.map(d => {
                const m = LEAVE_META[d.type] || { label:d.type, color:'slate' };
                const u = allUsersData.find(x => x.email === d.user) || { name: d.name || d.user };
                return `<div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-3 relative hover:shadow-md transition-shadow">
                    <div class="flex items-center gap-3">
                        <img src="${getAvatar(u)}" class="w-10 h-10 rounded-full bg-slate-50 border border-slate-100 object-cover">
                        <div>
                            <h4 class="font-black text-sm text-textMain">${u.name}</h4>
                            <p class="text-[10px] font-bold text-textMuted uppercase tracking-wider">${fmtDate(getMillis(d.submitted_at))}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black text-${m.color}-700 bg-${m.color}-50 px-2.5 py-1 rounded-md border border-${m.color}-100 shadow-sm"><i class="fas fa-tag mr-1"></i> ${m.label}</span>
                        <span class="text-[10px] font-black text-slate-600 bg-slate-100 px-2.5 py-1 rounded-md border border-slate-200 shadow-sm"><i class="far fa-calendar-alt mr-1"></i> ${d.target_date||'—'}</span>
                    </div>
                    <p class="text-xs text-textMain bg-surface p-3 rounded-xl border border-slate-100 font-medium leading-relaxed shadow-inner">"${d.reason||'No reason provided.'}"</p>
                    <div class="flex gap-2 pt-2 border-t border-slate-100">
                        <p class="text-[10px] text-textMuted font-bold text-center w-full mt-1"><i class="fas fa-clock mr-1"></i> Waiting for Admin Approval</p>
                    </div>
                </div>`;
            }).join('');
        }, err => console.warn('leaves:', err.message));
    }
    window.processRequest = async function(id, newStatus, type, userEmail) {
        const isApprove = newStatus === 'approved';
        const r = await Swal.fire({ title:isApprove?'Approve Request?':'Reject Request?', text:(isApprove && type==='annual')?'1 day will be deducted from vacation balance.':'', icon:isApprove?'question':'warning', showCancelButton:true, confirmButtonColor:isApprove?'#10b981':'#ef4444', cancelButtonColor:'#64748b', confirmButtonText:'Confirm', cancelButtonText:'Cancel' });
        if (!r.isConfirmed) return;
        try {
            await db.collection('leave_requests').doc(id).update({ status:newStatus, reviewed_at: serverTs(), reviewed_by: userProfile.name || 'Admin' });
            if (isApprove && type === 'annual' && userEmail) {
                const ref = db.collection('hr_stats').doc(userEmail.toLowerCase().trim());
                const cur = (userEmail in leaveBalances) ? leaveBalances[userEmail] : ANNUAL_LEAVE_DEFAULT;
                await ref.set({ annualLeavesLeft: Math.max(0, cur - 1) }, { merge:true });
            }
            Toast.fire({icon:'success', title:'Request updated.'});
        } catch (e) { console.error(e); Toast.fire({icon:'error', title:'An error occurred.'}); }
    };

    // Tabs navigation
    function switchTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(el => { el.classList.add('hidden'); el.classList.remove('flex'); });
        document.querySelectorAll('.nav-link').forEach(el => {
            el.classList.remove('active', 'bg-brand-soft', 'text-brand-blue');
            el.classList.add('text-textMuted');
        });
        
        const pane = document.getElementById('tab-' + tabId);
        if(pane) { pane.classList.remove('hidden'); pane.classList.add('flex'); }
        
        const nav = document.getElementById('nav-' + tabId);
        if(nav) {
            nav.classList.add('active', 'bg-brand-soft', 'text-brand-blue');
            nav.classList.remove('text-textMuted');
        }
    }

    // Modal forms
    async function openUserModal(mode) {
        const isNew = mode === 'new';
        const form = document.getElementById('user-setup-form'); form.reset();
        document.getElementById('user-photo-b64').value = '';
        document.getElementById('modal-user-title').innerHTML = isNew ? '<i class="fas fa-user-plus text-brand-blue"></i> Add New Employee' : '<i class="fas fa-user-pen text-brand-blue"></i> Edit Employee';
        document.getElementById('u-email').disabled = !isNew;
        document.getElementById('password-container').style.display = isNew ? '' : 'none';
        document.getElementById('delete-user-btn').classList.toggle('hidden', isNew);
        document.getElementById('edit-mode-email').value = isNew ? '' : mode;

        if (isNew) {
            document.getElementById('u-gender').value = 'male';
            updateFallbackPreview();
            document.getElementById('u-leave-balance').value = ANNUAL_LEAVE_DEFAULT;
            document.getElementById('u-online-limit').value = 0;
        } else {
            const u = allUsersData.find(x => x.email === mode) || {};
            document.getElementById('u-name').value = u.name || '';
            document.getElementById('u-title').value = u.title || '';
            document.getElementById('u-email').value = mode;
            document.getElementById('u-role').value = u.role || 'employee';
            document.getElementById('u-gender').value = u.gender || 'male';
            document.getElementById('u-suspended').checked = !!u.isSuspended;
            document.getElementById('perm-crm').checked = !!(u.permissions && u.permissions.crm);
            document.getElementById('perm-payroll').checked = !!(u.permissions && u.permissions.payroll);
            document.getElementById('user-photo-preview').src = getAvatar(u);
            document.getElementById('user-photo-b64').value = u.photo || '';
            document.getElementById('u-leave-balance').value = balanceOf(mode);
            document.getElementById('u-online-limit').value = u.onlineDaysLimit || 0;
        }
        openModal('modal-user-form');
    }

    function previewUserPhoto(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas'); c.width = 150; c.height = 150;
                c.getContext('2d').drawImage(img, 0, 0, 150, 150);
                const b64 = c.toDataURL('image/jpeg', 0.8);
                document.getElementById('user-photo-preview').src = b64;
                document.getElementById('user-photo-b64').value = b64;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function saveUserData(e) {
        e.preventDefault();
        const btn = document.getElementById('save-user-btn'), orig = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
        const isNew = !document.getElementById('edit-mode-email').value;
        const email = (isNew ? document.getElementById('u-email').value : document.getElementById('edit-mode-email').value).toLowerCase().trim();
        const pass = document.getElementById('u-password').value;
        const balance = parseInt(document.getElementById('u-leave-balance').value);
        const onLimit = parseInt(document.getElementById('u-online-limit').value) || 0;

        const data = {
            name: document.getElementById('u-name').value.trim(),
            title: document.getElementById('u-title').value.trim(),
            role: document.getElementById('u-role').value,
            gender: document.getElementById('u-gender').value,
            onlineDaysLimit: onLimit,
            isSuspended: document.getElementById('u-suspended').checked,
            permissions: { crm: document.getElementById('perm-crm').checked, payroll: document.getElementById('perm-payroll').checked },
            photo: document.getElementById('user-photo-b64').value || ''
        };

        try {
            if (isNew) {
                if (!pass || pass.length < 6) throw new Error('Password must be at least 6 characters.');
                await secondaryAuth.createUserWithEmailAndPassword(email, pass);
                await secondaryAuth.signOut();
                const zero = {}; countedKeys().forEach(k => zero[k] = 0);
                data.status = 'Offline'; data.timeBank = zero; data.firstOnlineAt = null; data.dayKey = '';
                data.lastChange = serverTs(); data.createdAt = serverTs();
                await db.collection('users').doc(email).set(data);
            } else {
                await db.collection('users').doc(email).update(data);
            }
            if (!isNaN(balance)) await db.collection('hr_stats').doc(email).set({ annualLeavesLeft: balance }, { merge:true });
            closeModal('modal-user-form');
            Toast.fire({icon:'success', title: isNew ? 'Account created.' : 'Profile updated.'});
        } catch (err) { Swal.fire('Error', err.message, 'error'); }
        finally { btn.disabled = false; btn.innerHTML = orig; }
    }

    async function deleteUser() {
        const email = document.getElementById('edit-mode-email').value;
        if (email === currentUser.email.toLowerCase()) { Swal.fire('Warning', 'Cannot delete active admin account.', 'warning'); return; }
        const r = await Swal.fire({ title:'Delete Employee?', text:'They will be removed from Firestore database.', icon:'error', showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#64748b', confirmButtonText:'Yes, Delete', cancelButtonText:'Cancel' });
        if (!r.isConfirmed) return;
        try {
            await db.collection('users').doc(email).delete();
            closeModal('modal-user-form');
            Toast.fire({icon:'success', title:'Employee deleted.'});
        } catch (e) { Toast.fire({icon:'error', title:'Deletion failed.'}); }
    }

    // Logs
    async function viewHistory(email, selectedDate) {
        currentViewingEmail = email;
        const body = document.getElementById('logs-timeline-body'), footer = document.getElementById('log-report-footer');
        const dayStr = selectedDate || zonedYMD(serverNow());
        document.getElementById('history-date-picker').value = dayStr;
        const u = allUsersData.find(x => x.email === email) || {};
        document.getElementById('log-report-subtitle').innerText = `${u.name || email}`;
        body.innerHTML = `<tr><td colspan="6" class="py-16 text-center text-textMuted font-bold"><i class="fas fa-spinner fa-spin text-brand-blue text-3xl mb-3 block"></i> Loading history...</td></tr>`;
        openModal('modal-logs');
        try {
            const snap = await db.collection('logs').where('user','==',email.toLowerCase().trim()).where('dayKey','==',dayStr).get();
            const rows = [];
            snap.forEach(d => { rows.push(d.data()); });
            rows.sort((a,b) => getMillis(b.timestamp) - getMillis(a.timestamp));
            if (!rows.length) {
                body.innerHTML = `<tr><td colspan="6" class="py-16 text-center text-slate-400 font-bold"><i class="fas fa-folder-open text-5xl mb-4 block opacity-50"></i> No activity found on this day.</td></tr>`;
                footer.innerHTML = '<span class="text-sm text-slate-400 font-bold">No Data</span>'; return;
            }
            const totals = {}; countedKeys().forEach(k => totals[k] = 0);
            body.innerHTML = ''; let i = 1;
            rows.forEach(l => {
                const dur = (typeof l.duration_ms === 'number') ? l.duration_ms : 0;
                if (l.from_status && totals.hasOwnProperty(l.from_status)) totals[l.from_status] += dur;
                const ms = getMillis(l.timestamp);
                const byAdmin = l.changed_by === 'admin';
                body.innerHTML += `<tr class="hover:bg-slate-50/60 transition-colors">
                    <td class="p-3 text-center text-slate-400">${i++}</td>
                    <td class="p-3"><span class="px-2.5 py-1 text-[10px] font-black rounded-lg bg-slate-100 border border-slate-200 uppercase tracking-wider">${sLabel(l.from_status)}</span></td>
                    <td class="p-3"><i class="fas fa-arrow-right-long text-slate-300 mx-2"></i><span class="px-2.5 py-1 text-[10px] font-black rounded-lg bg-${sColor(l.to_status)}-500 text-white uppercase tracking-wider shadow-sm">${sLabel(l.to_status)}</span></td>
                    <td class="p-3 text-center text-[11px] text-textMuted font-bold">${fmtTime(ms)}</td>
                    <td class="p-3 text-center text-brand-blue font-black tabular-nums">${(typeof l.duration_ms==='number')?fmtDuration(dur):'—'}</td>
                    <td class="p-3 text-center">${byAdmin?'<span class="text-[9px] font-black px-2 py-0.5 rounded-md bg-violet-50 text-violet-600 border border-violet-100 shadow-sm uppercase">Admin</span>':'<span class="text-[9px] font-black px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 border border-slate-200 shadow-sm uppercase">Self</span>'}</td>
                </tr>`;
            });
            footer.innerHTML = `<div class="flex flex-wrap gap-3 w-full text-xs font-black">` + countedKeys().map(k =>
                `<div class="flex-1 min-w-[130px] text-center text-${sColor(k)}-700 bg-${sColor(k)}-50 border border-${sColor(k)}-100 py-2.5 rounded-xl shadow-sm"><i class="fas ${sIcon(k)} mr-2"></i> ${sLabel(k)}: ${fmtDuration(totals[k])}</div>`
            ).join('') + `</div>`;
        } catch (e) { console.error(e); body.innerHTML = `<tr><td colspan="6" class="py-16 text-center text-red-500 font-bold">Failed to load history.</td></tr>`; }
    }
    function refreshHistoryWithDate() {
        const d = document.getElementById('history-date-picker').value;
        if (currentViewingEmail && d) viewHistory(currentViewingEmail, d);
    }

    // Settings
    function openSettings() {
        document.getElementById('cfg-reset-hour').value = RESET_HOUR;
        document.getElementById('cfg-work-start').value = WORK_START;
        document.getElementById('cfg-annual-default').value = ANNUAL_LEAVE_DEFAULT;
        const box = document.getElementById('status-editor');
        box.innerHTML = EDITABLE.map(k => {
            const s = STATUSES[k];
            const opts = PALETTE.map(c => `<option value="${c}" ${c===s.color?'selected':''}>${c}</option>`).join('');
            return `<div class="p-4 border border-slate-200 rounded-2xl bg-white shadow-sm" data-status-key="${k}">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm font-black text-brand-navy"><i class="fas ${s.icon} text-${s.color}-500 mr-2"></i> ${k}</span>
                    <label class="flex items-center gap-2 text-[10px] font-black text-textMuted cursor-pointer uppercase tracking-wider"><input type="checkbox" class="cfg-enabled w-4 h-4 rounded text-brand-blue focus:ring-brand-blue" ${s.enabled!==false?'checked':''}> Enabled</label>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <div><label class="text-[9px] font-black text-textMuted block mb-1 uppercase tracking-wider">Display Name</label><input class="cfg-label w-full bg-surface border border-slate-200 h-10 rounded-xl px-3 text-xs font-bold outline-none focus:border-brand-blue" value="${s.label}"></div>
                    <div><label class="text-[9px] font-black text-textMuted block mb-1 uppercase tracking-wider">Button Label</label><input class="cfg-btn w-full bg-surface border border-slate-200 h-10 rounded-xl px-3 text-xs font-bold outline-none focus:border-brand-blue" value="${s.btnLabel||s.label}"></div>
                    <div><label class="text-[9px] font-black text-textMuted block mb-1 uppercase tracking-wider">Color Theme</label><select class="cfg-color w-full bg-surface border border-slate-200 h-10 rounded-xl px-3 text-xs font-bold outline-none focus:border-brand-blue cursor-pointer">${opts}</select></div>
                    <div><label class="text-[9px] font-black text-textMuted block mb-1 uppercase tracking-wider">Icon Class</label><input class="cfg-icon w-full bg-surface border border-slate-200 h-10 rounded-xl px-3 text-xs font-bold outline-none focus:border-brand-blue" value="${s.icon}"></div>
                </div>
            </div>`;
        }).join('');
        openModal('modal-settings');
    }
    async function saveSettings() {
        const btn = document.getElementById('save-settings-btn'), orig = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
        try {
            const statuses = {};
            document.querySelectorAll('#status-editor [data-status-key]').forEach(row => {
                const k = row.dataset.statusKey;
                statuses[k] = {
                    label: row.querySelector('.cfg-label').value.trim() || k,
                    btnLabel: row.querySelector('.cfg-btn').value.trim(),
                    color: row.querySelector('.cfg-color').value,
                    icon: row.querySelector('.cfg-icon').value.trim() || 'fa-circle',
                    enabled: row.querySelector('.cfg-enabled').checked,
                    counted: true
                };
            });
            const cfg = {
                resetHour: Math.min(23, Math.max(0, parseInt(document.getElementById('cfg-reset-hour').value) || 23)),
                workStart: document.getElementById('cfg-work-start').value || '09:00',
                annualLeaveDefault: parseInt(document.getElementById('cfg-annual-default').value) || 21,
                statuses
            };
            await db.collection('system_settings').doc('work_config').set(cfg, { merge:true });
            closeModal('modal-settings');
            Toast.fire({icon:'success', title:'Settings saved successfully.'});
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
        finally { btn.disabled = false; btn.innerHTML = orig; }
    }

    function startClock() {
        const upd = () => { const ms = serverNow(); document.getElementById('header-time').innerText = (()=>{const p=zonedParts(ms);return `${pad(p.h)}:${pad(p.mi)}:${pad(p.s)}`;})(); document.getElementById('header-date').innerText = fmtDate(ms); };
        upd(); setInterval(upd, 1000);
    }
    function updateTimersUI() {
        const now = serverNow();
        document.querySelectorAll('.stat-timer').forEach(t => {
            const b = parseInt(t.dataset.val)||0, s = parseInt(t.dataset.start)||0;
            t.innerText = fmtDuration(t.dataset.active === 'true' ? b + (now - s) : b);
        });
    }

    function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
    document.addEventListener('keydown', e => {
        if (e.key !== 'Escape') return;
        ['modal-user-form','modal-logs','modal-settings'].forEach(id => document.getElementById(id).classList.add('hidden'));
    });
    </script>
